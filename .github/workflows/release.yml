name: Release Build

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read
  actions: read

env:
  CARGO_TERM_COLOR: always
  APP_NAME: tree-iptv-player

jobs:
  # 读取版本号（全局共用）
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Read version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep -m1 '^version =' src-tauri/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ 读取到版本号：$VERSION"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [get-version]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-pc-windows-msvc }
      - run: npm ci
      - run: npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          args: --verbose

      # 重命名所有 Windows 输出
      - name: Rename artifacts
        run: |
          ren "src-tauri\target\release\bundle\nsis\*.exe" "${{ env.APP_NAME }}_${{ env.VERSION }}_windows_amd64-setup.exe"
          ren "src-tauri\target\release\bundle\msi\*.msi" "${{ env.APP_NAME }}_${{ env.VERSION }}_windows_amd64.msi"
          copy "src-tauri\target\release\${{ env.APP_NAME }}.exe" "${{ env.APP_NAME }}_${{ env.VERSION }}_windows_amd64-portable.exe"
        shell: pwsh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            *.exe
            *.msi

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: [get-version]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-unknown-linux-gnu }
      - run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev pkg-config
      - run: npm ci
      - run: npm run build
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          args: --verbose

      # 重命名 Linux + 打包便携版
      - name: Rename artifacts
        run: |
          mv src-tauri/target/release/bundle/deb/*.deb "${{ env.APP_NAME }}_${{ env.VERSION }}_linux_amd64.deb"
          mv src-tauri/target/release/bundle/appimage/*.AppImage "${{ env.APP_NAME }}_${{ env.VERSION }}_linux_amd64.AppImage"
          cp src-tauri/target/release/${{ env.APP_NAME }} .
          tar -zcvf "${{ env.APP_NAME }}_${{ env.VERSION }}_linux_amd64.tar.gz" ${{ env.APP_NAME }}

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            *.deb
            *.AppImage
            *.tar.gz

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: [get-version]
    env:
      VERSION: ${{ needs.get-version.outputs.VERSION }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: x86_64-apple-darwin,aarch64-apple-darwin }
      - run: npm ci
      - run: npm run build

      # 构建 Intel
      - name: Build x86_64
        run: npm run tauri build -- --target x86_64-apple-darwin
      - name: Copy and rename x86_64 dmg
        run: mv src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg "${{ env.APP_NAME }}_${{ env.VERSION }}_darwin_amd64.dmg"

      # 构建 Apple Silicon
      - name: Build aarch64
        run: npm run tauri build -- --target aarch64-apple-darwin
      - name: Copy and rename aarch64 dmg
        run: mv src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg "${{ env.APP_NAME }}_${{ env.VERSION }}_darwin_aarch64.dmg"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            *.dmg

  create-release:
    name: Create Release
    needs: [build-windows, build-linux, build-macos, get-version]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows-build/*
            linux-build/*
            macos-build/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}